<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fashion Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Roboto', sans-serif;
        }

        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(255, 215, 0, 0.2);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .login-card h2 {
            color: #333;
            margin-bottom: 24px;
            font-size: 24px;
        }

        .login-card .logo {
            margin-bottom: 20px;
        }

        .login-card .logo img {
            height: 60px;
            filter: drop-shadow(0 0 5px gold);
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid transparent;
            border-radius: 8px;
            background-color: #f5f5f5;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #FFD700;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .btn-submit {
            width: 100%;
            height: 48px;
            background-color: #FFD700;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #e6c200;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            margin-top: 24px;
            font-size: 14px;
            color: #555;
        }

        .footer-text a {
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #FFD700;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <img src="images/logo.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        <h2>Login to Your Account</h2>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">Login</span>
                <div class="spinner" id="spinner" style="display: none;"></div>
            </button>
        </form>

        <p class="footer-text">
            Don't have an account? <a href="register.html">Sign up now</a>
        </p>
        
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-right"></i> Back to Home
        </a>
    </div>

    <script>
        const API_BASE = 'https://backend-51wx.onrender.com/api';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const errorMessage = document.getElementById('errorMessage');
            
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorMessage.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('customerToken', data.token);
                    localStorage.setItem('customerUser', JSON.stringify(data.user));
                    
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    if (redirect) {
                        window.location.href = redirect;
                    } else {
                        window.location.href = 'cart-products.html';
                    }
                } else {
                    errorMessage.textContent = data.message || 'Login failed. Please check your credentials.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again later.';
                errorMessage.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
