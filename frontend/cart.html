<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWM STORE | Shopping Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        .navbar {
            background: #1a1a2e;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
        }

        .navbar .nav-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .navbar .cart-icon i {
            color: #FFD700;
            font-size: 22px;
        }

        .navbar .cart-icon .badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #FFD700;
            color: #000;
            font-size: 12px;
            font-weight: bold;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .navbar .user-avatar {
            width: 35px;
            height: 35px;
            background: #FFD700;
            border-radius: 50%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .breadcrumb span {
            color: #FFD700;
            font-weight: 500;
        }

        .cart-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .cart-items {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }

        .cart-items table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-items thead th {
            text-align: left;
            padding: 15px 10px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #eee;
        }

        .cart-items thead th:last-child {
            text-align: center;
        }

        .cart-items tbody tr {
            border-bottom: 1px solid #eee;
        }

        .cart-items tbody td {
            padding: 20px 10px;
            vertical-align: middle;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .prod-img {
            width: 70px;
            height: 70px;
            background: #f5f5f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .prod-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .prod-img i {
            color: #ccc;
            font-size: 24px;
        }

        .prod-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-control button {
            width: 32px;
            height: 32px;
            border: 2px solid #FFD700;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            color: #333;
            transition: all 0.3s;
        }

        .qty-control button:hover {
            background: #FFD700;
            color: #000;
        }

        .qty-control input {
            width: 45px;
            height: 32px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        .subtotal {
            font-weight: 700;
            color: #FFD700;
            font-size: 16px;
        }

        .remove-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #ffe5e5;
            border-radius: 50%;
            cursor: pointer;
            color: #ff4444;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .remove-btn:hover {
            background: #ff4444;
            color: #fff;
        }

        .cart-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn-primary {
            padding: 12px 25px;
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #e6c200;
        }

        .btn-outline {
            padding: 12px 25px;
            background: transparent;
            color: #666;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .order-summary {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .order-summary h3 {
            font-size: 18px;
            color: #333;
            margin: 0 0 20px 0;
            padding-bottom: 15px;
            border-bottom: 2px solid #FFD700;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 14px;
            color: #555;
        }

        .summary-row span:last-child {
            font-weight: 600;
            color: #333;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            margin-top: 10px;
            border-top: 2px solid #eee;
        }

        .total-label {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        .total-amount {
            font-size: 22px;
            font-weight: 700;
            color: #FFD700;
        }

        .pay-btn {
            width: 100%;
            padding: 14px;
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .pay-btn:hover {
            background: #e6c200;
            transform: translateY(-2px);
        }

        .pay-btn span {
            font-size: 13px;
            font-weight: 500;
        }

        .empty-cart {
            text-align: center;
            padding: 80px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }

        .empty-cart i {
            font-size: 80px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-cart h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: #666;
            margin-bottom: 25px;
        }

        @media (max-width: 992px) {
            .cart-wrapper {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }

            .cart-items table thead {
                display: none;
            }

            .cart-items table tbody tr {
                display: block;
                padding: 15px 0;
            }

            .cart-items table tbody td {
                display: flex;
                justify-content: space-between;
                padding: 8px 0;
            }

            .cart-items table tbody td:first-child {
                order: -1;
                margin-bottom: 10px;
            }

            .product-info {
                width: 100%;
            }
        }

        @media (max-width: 576px) {
            .navbar {
                padding: 15px 20px;
            }

            .cart-actions {
                flex-direction: column;
            }

            .btn-primary,
            .btn-outline {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">CWM STORE</div>
        <div class="nav-icons">
            <div class="cart-icon" onclick="viewCartProducts()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="badge" id="cart-badge">0</span>
            </div>
            <div class="user-avatar" id="userAvatar"></div>
        </div>
    </header>

    <main class="container">
        <nav class="breadcrumb">Home > <span>Cart</span></nav>

        <div id="cartContent"></div>
    </main>

    <script>
        const API_BASE = 'https://backend-51wx.onrender.com/api';
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        document.addEventListener('DOMContentLoaded', function() {
            renderCart();
            updateBadge();
        });

        function updateBadge() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-badge').textContent = count;
        }

        function viewCartProducts() {
            window.location.href = 'shop.html';
        }

        function renderCart() {
            const container = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added any items to your cart yet.</p>
                        <a href="shop.html" class="btn-primary">Start Shopping</a>
                    </div>
                `;
                return;
            }

            let subtotal = 0;
            const rowsHtml = cart.map(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                return `
                    <tr class="cart-row" data-price="${item.price}">
                        <td class="product-info">
                            <div class="prod-img">
                                ${item.image ? `<img src="${item.image}" alt="${item.name}">` : '<i class="fa-solid fa-image"></i>'}
                            </div>
                            <span class="prod-name">${item.name}</span>
                        </td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td>
                            <div class="qty-control">
                                <button class="minus" onclick="updateQuantity('${item.id}', -1)">-</button>
                                <input type="text" value="${item.qty}" readonly>
                                <button class="plus" onclick="updateQuantity('${item.id}', 1)">+</button>
                            </div>
                        </td>
                        <td class="subtotal">$${itemTotal.toFixed(2)}</td>
                        <td><button class="remove-btn" onclick="removeItem('${item.id}')"><i class="fa-solid fa-trash-can"></i></button></td>
                    </tr>
                `;
            }).join('');

            const total = subtotal;

            container.innerHTML = `
                <div class="cart-wrapper">
                    <section class="cart-items">
                        <table>
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="cart-table-body">
                                ${rowsHtml}
                            </tbody>
                        </table>
                        <div class="cart-actions">
                            <a href="shop.html" class="btn-primary"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
                            <button class="btn-outline" onclick="clearCart()"><i class="fa-solid fa-trash"></i> Clear Cart</button>
                        </div>
                    </section>
                    <aside class="order-summary">
                        <h3>Order Details</h3>
                        <div class="summary-row">
                            <span>Sub Total</span>
                            <span id="summary-subtotal">$${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax</span>
                            <span>$0</span>
                        </div>
                        <div class="summary-total">
                            <span class="total-label">Total Amount</span>
                            <span id="final-total" class="total-amount">$${total.toFixed(2)}</span>
                        </div>
                        <button class="pay-btn" onclick="proceedToPay()">
                            Pay <span>$${total.toFixed(2)}</span>
                        </button>
                    </aside>
                </div>
            `;
        }

        function updateQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty < 1) {
                    removeItem(id);
                } else {
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateBadge();
                    renderCart();
                }
            }
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateBadge();
            renderCart();
        }

        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                cart = [];
                localStorage.setItem('cart', JSON.stringify(cart));
                updateBadge();
                renderCart();
            }
        }

        function proceedToPay() {
            alert('Payment feature coming soon! Please contact us to complete your order.');
        }
    </script>
</body>
</html>
