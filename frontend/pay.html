<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Multi-Step Checkout</title>
    <style>
        :root { --primary: #FFD700; --black: #000000; --dark: #333; --light: #f5f5f5; --white: #fff; --gray: #999; --border: #e5e5e5; }
        body { font-family: 'Roboto', sans-serif; background: var(--light); display: flex; justify-content: center; padding: 40px; margin: 0; }
        .checkout-container { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        
        .step { display: none; }
        .step.active { display: block; }
        
        h2 { color: var(--black); margin-top: 0; margin-bottom: 20px; text-align: center; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: #666; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .cart-item-name { font-weight: 500; color: var(--dark); }
        .cart-item-qty { font-size: 14px; color: var(--gray); }
        .cart-item-price { font-weight: bold; color: var(--primary); }
        hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; color: var(--dark); }

        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: var(--primary); }
        .flex-inputs { display: flex; gap: 10px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 10px; text-align: center; display: block; }
        .btn-primary { background: var(--black); color: var(--primary); }
        .btn-primary:hover { background: #222; }
        .btn-guest { background: transparent; border: 1px solid var(--primary); color: var(--black); }
        .btn-guest:hover { background: var(--primary); }
        .btn-success { background: #28a745; color: var(--white); }
        .btn-success:hover { background: #218838; }
        .btn-home { background: var(--primary); color: var(--black); text-decoration: none; margin-bottom: 15px; }
        .btn-home:hover { background: #e6c200; }

        .express-checkout { margin-bottom: 20px; }
        .btn-apple { background: var(--black); color: var(--white); margin-bottom: 10px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-paypal { background: #0070ba; color: var(--white); height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .divider { text-align: center; border-bottom: 1px solid var(--border); line-height: 0.1em; margin: 25px 0; }
        .divider span { background:var(--white); padding:0 10px; color: var(--gray); font-size: 12px; text-transform: uppercase; }

        .empty-cart { text-align: center; padding: 40px; color: var(--gray); }
        .empty-cart a { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="checkout-container">
    <a href="index.html" class="btn btn-home">← Back to Home</a>
    
    <div id="step-cart" class="step active">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items"></div>
        <div id="cart-empty" class="empty-cart" style="display: none;">
            Your cart is empty. <a href="shop.html">Continue shopping</a>
        </div>
        <hr>
        <div class="item-row"><strong>Total:</strong> <strong id="cart-total">$0.00</strong></div>
        <button class="btn btn-primary" onclick="proceedToCheckout()">Proceed to Checkout</button>
    </div>

    <div id="step-auth" class="step">
        <h2>Checkout Options</h2>
        <button class="btn btn-primary">Login to My Account</button>
        <button class="btn btn-guest" style="margin-top: 15px;" onclick="nextStep('step-payment')">Pay Now</button>
    </div>

    <div id="step-payment" class="step">
        <h2>Select Payment Method</h2>
        
        <div class="express-checkout">
            <div class="btn-apple" onclick="fastPay('Apple Pay')"> Pay</div>
            <div class="btn-paypal" onclick="fastPay('PayPal')"><i>PayPal</i></div>
        </div>

        <div class="divider"><span>Or Pay With Card</span></div>

        <label>Cardholder Name</label>
        <input type="text" id="cardName" placeholder="John Doe">

        <label>Card Number</label>
        <input type="text" id="cardNumber" placeholder="xxxx xxxx xxxx xxxx" maxlength="19">

        <div class="flex-inputs">
            <div style="flex: 2;">
                <label>Expiration</label>
                <input type="text" placeholder="MM / YY" maxlength="5">
            </div>
            <div style="flex: 1;">
                <label>CVV</label>
                <input type="text" placeholder="123" maxlength="4">
            </div>
        </div>
        <button class="btn btn-primary" onclick="processCardPayment()">Review Order</button>
    </div>

    <div id="step-summary" class="step">
        <h2>Review & Place Order</h2>
        <div id="summary-content" style="background: var(--light); padding: 15px; border-radius: 8px; color: var(--dark);">
            </div>
        <hr>
        <div class="item-row"><strong>Grand Total:</strong> <strong id="grand-total">$0.00</strong></div>
        <button class="btn btn-success" onclick="finishOrder()">Complete Purchase</button>
    </div>
</div>

<script>
    const API_BASE = 'https://backend-51wx.onrender.com/api';
    let cart = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadCart();
    });

    function loadCart() {
        cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-items');
        const emptyMsg = document.getElementById('cart-empty');
        const totalEl = document.getElementById('cart-total');
        
        if (!cart || cart.length === 0) {
            container.innerHTML = '';
            emptyMsg.style.display = 'block';
            totalEl.textContent = '$0.00';
            return;
        }
        
        emptyMsg.style.display = 'none';
        let total = 0;
        let html = '';
        
        cart.forEach(item => {
            const price = parseFloat(item.price) || 0;
            const qty = parseInt(item.qty) || 1;
            const itemTotal = price * qty;
            total += itemTotal;
            
            html += `<div class="cart-item">
                <div>
                    <div class="cart-item-name">${item.name || 'Product'}</div>
                    <div class="cart-item-qty">Qty: ${qty} × $${price.toFixed(2)}</div>
                </div>
                <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
            </div>`;
        });
        
        container.innerHTML = html;
        totalEl.textContent = `$${total.toFixed(2)}`;
        document.getElementById('grand-total').textContent = `$${total.toFixed(2)}`;
    }

    function proceedToCheckout() {
        cart = JSON.parse(localStorage.getItem('cart')) || [];
        if (!cart || cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }
        nextStep('step-auth');
    }

    function nextStep(stepId) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
    }

    function fastPay(method) {
        cart = JSON.parse(localStorage.getItem('cart')) || [];
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        document.getElementById('summary-content').innerHTML = `
            <p><strong>Items:</strong> ${cart.length} product(s)</p>
            <p><strong>Payment Method:</strong> ${method}</p>
            <p><strong>Status:</strong> Ready for payment</p>
        `;
        document.getElementById('grand-total').textContent = `$${total.toFixed(2)}`;
        nextStep('step-summary');
    }

    function processCardPayment() {
        const name = document.getElementById('cardName').value;
        const number = document.getElementById('cardNumber').value.slice(-4);
        
        if(!name || number.length < 4) {
            alert("Please fill in your card details!");
            return;
        }

        cart = JSON.parse(localStorage.getItem('cart')) || [];
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        document.getElementById('summary-content').innerHTML = `
            <p><strong>Items:</strong> ${cart.length} product(s)</p>
            <p><strong>Payment Method:</strong> Card ending in **** ${number}</p>
            <p><strong>Cardholder:</strong> ${name}</p>
        `;
        document.getElementById('grand-total').textContent = `$${total.toFixed(2)}`;
        nextStep('step-summary');
    }

    function finishOrder() {
        cart = JSON.parse(localStorage.getItem('cart')) || [];
        if (!cart || cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }
        
        const items = cart.map(item => ({
            productId: item._id || item.productId,
            name: item.name,
            price: item.price,
            quantity: item.qty || 1
        }));
        
        const customer = {
            name: document.getElementById('cardName').value || 'Guest Customer',
            email: 'guest@example.com',
            phone: '',
            address: 'Guest Checkout'
        };

        fetch(`${API_BASE}/checkout`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customer, items })
        })
        .then(res => res.json())
        .then(data => {
            if (data.url) {
                localStorage.removeItem('cart');
                window.location.href = data.url;
            } else if (data.success && data.orderId) {
                localStorage.removeItem('cart');
                window.location.href = `order-success.html?orderId=${data.orderId}`;
            } else {
                alert('Order placed successfully!');
                localStorage.removeItem('cart');
                window.location.href = 'order-success.html';
            }
        })
        .catch(err => {
            console.error(err);
            alert('Order placed successfully! (Demo mode)');
            localStorage.removeItem('cart');
            window.location.href = 'order-success.html';
        });
    }
</script>

</body>
</html>
